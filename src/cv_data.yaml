profile:
  en: "Ph.D. candidate in Computer Science at UBA and CONICET doctoral fellow, with a profile centered on university teaching and academic research. I work between the Applied Artificial Intelligence Lab and the Rebeca Cherep de Guber Institute of Calculus on computational models of eye movements during visual search in natural scenes. My work combines Machine Learning, Bayesian modeling, and computational neuroscience, alongside sustained teaching in undergraduate and graduate courses at UBA."
  es: "Doctorando en Ciencias de la Computación en la UBA y becario doctoral de CONICET, con un perfil centrado en la docencia universitaria y la investigación académica. Trabajo entre el Laboratorio de Inteligencia Artificial Aplicada y el Instituto de Cálculo Rebeca Cherep de Guber en modelos computacionales de movimientos oculares durante tareas de búsqueda visual en escenas naturales. Mi trabajo combina Machine Learning, modelado bayesiano y neurociencia computacional, junto con actividad docente sostenida en materias de grado y posgrado de la UBA."


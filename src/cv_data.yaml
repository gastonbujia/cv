profile:
  en: "Interdisciplinary Data Scientist and Neuroscientist, currently in the final stage of a Ph.D. in Computer Science (University of Buenos Aires). Specialized in **behavioral analysis, eye-tracking, and Machine Learning applied to computational psychiatry**. My experience ranges from predictive modeling and advanced processing of psychophysiological signals and trajectories to Open Source software development. Passionate about translating complex human behavior problems into data-driven solutions, communicating them effectively, and building valuable, scalable software products."
  es: "Data Scientist y Neurocientífico con enfoque interdisciplinario, cursando la etapa final del Doctorado en Ciencias de la Computación (UBA). Especializado en **análisis de comportamiento, eye-tracking y Machine Learning aplicados a la psiquiatría computacional**. Mi experiencia abarca desde el modelado predictivo y procesamiento avanzado de señales psicofisiológicas y trayectorias hasta el desarrollo de herramientas Open Source. Apasionado por traducir problemas complejos del comportamiento humano en soluciones basadas en datos, comunicarlas efectivamente y crear productos de software útiles y escalables."

experience:
  - id: "graduate_researcher"
    title:
      en: "Graduate Researcher (Ph.D. Candidate in Computer Science)"
      es: "Investigador en Formación (Doctorando en Ciencias de la Computación)"
    company:
      en: "Applied Artificial Intelligence Lab (LIAA, ICC, UBA-CONICET)"
      es: "Laboratorio de Inteligencia Artificial Aplicada (LIAA, ICC, UBA-CONICET)"
    period: "2020 - 2026"
    highlights:
      en:
        - "**Project:** Development of computational tools for the early detection of cognitive deficits using predictions based on visual and manual trajectories."
        - "**Predictive Modeling:** Application of Machine Learning to classify and understand the algorithm behind complex task execution in patients. Feature engineering derived from high-precision measurements (hand & eye tracking)."
        - "**Experimental Web Development:** Implementation of remote cognitive assessments via webcam eye-tracking, developing custom browser-based data capture solutions."
        - "*Funding: CONICET Doctoral Fellowship.*"
      es:
        - "**Proyecto:** Desarrollo de herramientas computacionales para la detección temprana de déficits cognitivos mediante predicciones basadas en trayectorias visuales y manuales."
        - "**Modelado Predictivo:** Uso de Machine Learning para clasificar y entender el algoritmo detrás de la ejecución de tareas complejas en pacientes. Ingeniería de features a partir de mediciones de alta precisión (hand & eye tracking)."
        - "**Desarrollo Web Experimental:** Implementación de evaluaciones cognitivas remotas mediante eye-tracking por cámara web, desarrollando soluciones para capturar datos en el navegador."
        - "*Financiamiento: Beca de Doctorado CONICET.*"

  - id: "data_scientist_caf"
    title:
      en: "Data Scientist"
      es: "Data Scientist"
    company:
      en: "Development Bank of Latin America and the Caribbean (CAF)"
      es: "Banco de Desarrollo de América Latina y el Caribe (CAF)"
    period: "2021 - 2022"
    highlights:
      en:
        - "**Project:** Early warning system to prevent school dropout in the province of Mendoza, Argentina."
        - "**Tasks:** Data extraction and cleaning, creation and evaluation of Machine Learning models (risk classification/prediction), and development of dashboards for decision-making."
      es:
        - "**Proyecto:** Sistema de alertas tempranas para prevenir el abandono escolar en la provincia de Mendoza."
        - "**Tareas:** Extracción y limpieza de datos, creación y evaluación de modelos de Machine Learning (clasificación/predicción de riesgo) y desarrollo de visualizaciones para toma de decisiones."

  - id: "open_source"
    title:
      en: "Open Source Maintainer & Core Contributor"
      es: "Desarrollador y Colaborador Principal Open Source"
    company:
      en: "DataPruebas / \"pyxations\" Library (Python)"
      es: "DataPruebas / Librería \"pyxations\" (Python)"
    period:
      en: "2024 - Present"
      es: "2024 - Actualidad"
    highlights:
      en:
        - "**DataPruebas:** Co-creator of [datapruebas.org](https://datapruebas.org/), an online platform for scientific data collection, integrating open-source frameworks (jsPsych, PsychoPy) and enabling multi-modal data capture (eye-tracking, audio, mouse)."
        - "**Pyxations:** Co-creator and core contributor of [Pyxations](https://github.com/NeuroLIAA/pyxations), a Python library designed to process, parse, and analyze eye-tracking events and data."
        - "Software architecture design, implementation of best practices, and open-source project management."
      es:
        - "**DataPruebas:** Co-creador de [datapruebas.org](https://datapruebas.org/), plataforma online para recolección de datos científicos, integrando frameworks open-source (jsPsych, PsychoPy) y habilitando la captura de múltiples modalidades (eye-tracking, audio, mouse)."
        - "**Pyxations:** Co-creador y colaborador principal de [Pyxations](https://github.com/NeuroLIAA/pyxations), librería de Python orientada a procesar y analizar eventos y datos de eye-tracking."
        - "Diseño y desarrollo de arquitectura de software, implementación de buenas prácticas y administración de proyectos de código abierto."

  - id: "data_analyst_uba"
